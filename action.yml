name: "ADR 2.0 Agent Promotion"
description: "Promote AARs under configured docs/aar/ directories to ADRs under docs/adr/, update index.json (agent-friendly)."
inputs:
  llm_provider:
    description: "LLM provider to use: 'openai' or 'claude'"
    required: false
    default: "openai"
  openai_api_key:
    description: "OpenAI API key (required when llm_provider=openai)"
    required: false
  openai_model:
    description: "OpenAI model name"
    required: false
    default: "gpt-5.1"
  anthropic_api_key:
    description: "Anthropic API key (required when llm_provider=claude)"
    required: false
  claude_model:
    description: "Claude model name"
    required: false
    default: "claude-sonnet-4-6"
  github_token:
    description: "GitHub token for creating PRs (PAT recommended; GITHUB_TOKEN may be insufficient in some orgs)"
    required: true
  pr_branch:
    description: "Branch name for ADR auto-PR"
    required: false
    default: "adr/auto-update"
  pr_title:
    description: "PR title for ADR updates"
    required: false
    default: "chore: ADR auto-update"
  pr_body:
    description: "PR body for ADR updates"
    required: false
    default: "Automated ADR updates generated from AARs."
  pr_base:
    description: "Base branch for the PR (optional; defaults to repo default)"
    required: false
  reviewers:
    description: "Comma or newline separated GitHub usernames to request as PR reviewers"
    required: false
  docs_dirs:
    description: "Comma or newline separated docs directories to process. Each directory must contain aar/ and adr/. Defaults to docs"
    required: false
    default: "docs"
  add_paths:
    description: "Paths passed to create-pull-request add-paths"
    required: false
    default: "docs/**"
  language:
    description: "Language to generate ADRs (e.g., en, ko); default en"
    required: false
    default: "en"
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      shell: bash
      run: |
        pip install --upgrade pip
        pip install -r "$GITHUB_ACTION_PATH/requirements.txt"

    - name: Generate ADRs from AARs
      shell: bash
      env:
        LLM_PROVIDER: ${{ inputs.llm_provider }}
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        OPENAI_MODEL: ${{ inputs.openai_model }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        CLAUDE_MODEL: ${{ inputs.claude_model }}
        ADR2_REPO_ROOT: ${{ github.workspace }}
        ADR2_DOCS_DIRS: ${{ inputs.docs_dirs }}
        ADR2_LANGUAGE: ${{ inputs.language }}
      run: python "$GITHUB_ACTION_PATH/scripts/adr2_agent_action.py"

    - name: Show ADR indexes
      if: always()
      shell: bash
      env:
        ADR2_DOCS_DIRS: ${{ inputs.docs_dirs }}
      run: |
        set -euo pipefail

        mapfile -t docs_dirs < <(printf '%s\n' "${ADR2_DOCS_DIRS:-docs}" | tr ',' '\n' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' | sed '/^$/d')
        for docs_dir in "${docs_dirs[@]}"; do
          index_path="${docs_dir}/adr/index.json"
          echo "### ${index_path}"
          test -f "${index_path}" && cat "${index_path}" || echo "index.json not created"
        done

    - name: Create PR if changes
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ inputs.github_token || github.token }}
        commit-message: ${{ inputs.pr_title }}
        branch: ${{ inputs.pr_branch }}
        title: ${{ inputs.pr_title }}
        body: ${{ inputs.pr_body }}
        base: ${{ inputs.pr_base }}
        delete-branch: true
        reviewers: ${{ inputs.reviewers }}
        add-paths: ${{ inputs.add_paths }}
